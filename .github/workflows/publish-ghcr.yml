name: Publish image to GHCR

# Publishes the JVM image to GitHub Container Registry on every push to main,
# plus on manual dispatch. Consumed by rhombus-dev-sandbox's docker-compose.yml
# as the `floci` container image.
#
# Published tags:
#   ghcr.io/rhombussystems/floci:latest         — always tip of main
#   ghcr.io/rhombussystems/floci:<short-sha>    — pinnable by commit
#
# Auth uses the repo's GITHUB_TOKEN (granted packages:write below). No
# configured secrets needed — works out of the box in any fork.
#
# Multi-arch build: linux/amd64 + linux/arm64 so both Linux CI and M-series
# Macs can pull without emulation.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push GHCR image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JVM artifact
        run: ./mvnw clean package -DskipTests -q

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jvm-package
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/rhombussystems/floci:latest
            ghcr.io/rhombussystems/floci:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
